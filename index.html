<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cluihud</title>
    <style>
      body { background: #1a1a2e; margin: 0; }
      #splash {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #6c6c8a;
        font-family: system-ui, sans-serif;
        font-size: 13px;
      }
      #splash .dot {
        width: 6px; height: 6px;
        background: #e67e22;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash"><div class="dot"></div>loading cluihud...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
