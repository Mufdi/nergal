<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- HUD outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.3"/>

  <!-- HUD crosshair marks -->
  <line x1="256" y1="60" x2="256" y2="100" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="412" x2="256" y2="452" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="256" x2="100" y2="256" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="412" y1="256" x2="452" y2="256" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>

  <!-- HUD corner brackets (top-left) -->
  <path d="M100,160 L100,120 L140,120" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <!-- HUD corner brackets (top-right) -->
  <path d="M372,120 L412,120 L412,160" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <!-- HUD corner brackets (bottom-left) -->
  <path d="M100,352 L100,392 L140,392" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>
  <!-- HUD corner brackets (bottom-right) -->
  <path d="M372,392 L412,392 L412,352" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>

  <!-- Code brackets < > as central element -->
  <text x="256" y="280" text-anchor="middle" font-family="monospace" font-size="120" font-weight="bold" fill="url(#glow)">&lt;/&gt;</text>

  <!-- Terminal cursor blinking line -->
  <rect x="310" y="230" width="4" height="50" fill="#00d4ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Small HUD data lines (left side) -->
  <rect x="120" y="200" width="40" height="3" rx="1" fill="#00d4ff" opacity="0.4"/>
  <rect x="120" y="212" width="28" height="3" rx="1" fill="#7b2ff7" opacity="0.4"/>
  <rect x="120" y="224" width="35" height="3" rx="1" fill="#00d4ff" opacity="0.3"/>

  <!-- Small HUD data lines (right side) -->
  <rect x="352" y="300" width="40" height="3" rx="1" fill="#00d4ff" opacity="0.4"/>
  <rect x="358" y="312" width="34" height="3" rx="1" fill="#7b2ff7" opacity="0.4"/>
  <rect x="355" y="324" width="37" height="3" rx="1" fill="#00d4ff" opacity="0.3"/>
</svg>
