name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      # Tauri's `bundleMediaFramework: true` for AppImage links GStreamer
      # at bundle time; the bundler reads this env var to discover the
      # plugin path on the runner.
      GSTREAMER_PLUGINS_DIR: /usr/lib/x86_64-linux-gnu/gstreamer-1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build signed bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Emit Linux platform fragment
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | xargs basename)
          node scripts/generate-latest-json.mjs --fragment linux-x86_64 \
            "src-tauri/target/release/bundle/appimage/$APPIMAGE.sig" \
            "https://github.com/Mufdi/nergal/releases/download/$GITHUB_REF_NAME/$APPIMAGE" \
            "$GITHUB_REF_NAME" \
            ./linux-platform.json

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          # Fail loudly if a bundle path drifts, instead of shipping a release
          # missing an asset (see the macOS .dmg path bug).
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

      - name: Upload Linux platform fragment
        uses: actions/upload-artifact@v4
        with:
          name: linux-platform
          path: linux-platform.json

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build signed bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Emit macOS platform fragment
        run: |
          TARBALL=$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz | xargs basename)
          node scripts/generate-latest-json.mjs --fragment darwin-aarch64 \
            "src-tauri/target/release/bundle/macos/$TARBALL.sig" \
            "https://github.com/Mufdi/nergal/releases/download/$GITHUB_REF_NAME/$TARBALL" \
            "$GITHUB_REF_NAME" \
            ./macos-platform.json

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          # Tauri bundles the .dmg under bundle/dmg/ and the .app/.app.tar.gz
          # under bundle/macos/ — distinct dirs. A bundle/macos/*.dmg glob
          # matches nothing and upload-artifact only warns, so the .dmg
          # silently never reached the release. if-no-files-found: error turns
          # any future path drift into a hard failure instead of a missing asset.
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload macOS platform fragment
        uses: actions/upload-artifact@v4
        with:
          name: macos-platform
          path: macos-platform.json

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build signed bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Emit Windows platform fragment
        shell: pwsh
        # The updater consumes the zipped NSIS installer (*-setup.nsis.zip) +
        # its .sig, mirroring the macOS .app.tar.gz fragment.
        run: |
          $zip = (Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.nsis.zip).Name
          node scripts/generate-latest-json.mjs --fragment windows-x86_64 `
            "src-tauri/target/release/bundle/nsis/$zip.sig" `
            "https://github.com/Mufdi/nergal/releases/download/$env:GITHUB_REF_NAME/$zip" `
            "$env:GITHUB_REF_NAME" `
            ./windows-platform.json

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          # Same fail-loud contract as Linux/macOS: a drifted bundle subdir
          # (nsis/ vs msi/) becomes a hard failure, not a silently missing asset.
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.nsis.zip
            src-tauri/target/release/bundle/nsis/*-setup.nsis.zip.sig

      - name: Upload Windows platform fragment
        uses: actions/upload-artifact@v4
        with:
          name: windows-platform
          path: windows-platform.json

  publish:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract release body
        run: node scripts/extract-release-body.mjs "${GITHUB_REF_NAME#v}" > /tmp/release-body.md

      - name: Merge platform fragments into latest.json
        run: |
          node scripts/merge-latest-json.mjs \
            artifacts/linux-platform/linux-platform.json \
            artifacts/macos-platform/macos-platform.json \
            artifacts/windows-platform/windows-platform.json \
            /tmp/latest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # upload-artifact@v4 roots each artifact at the common ancestor of its
        # globs, so linux-artifacts keeps the bundler's deb/ rpm/ appimage/
        # subdirs — a bare `artifacts/linux-artifacts/*` glob then passes those
        # DIRECTORIES to gh, which errors. `find -type f` flattens any nesting
        # uniformly across both platforms. Tauri bundle names carry no spaces,
        # so unquoted word-splitting of $ASSETS is safe.
        run: |
          PRERELEASE=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then PRERELEASE="--prerelease"; fi
          ASSETS=$(find artifacts/linux-artifacts artifacts/macos-artifacts artifacts/windows-artifacts -type f)
          gh release create "$GITHUB_REF_NAME" \
            $PRERELEASE \
            --title "Nergal $GITHUB_REF_NAME" \
            --notes-file /tmp/release-body.md \
            $ASSETS \
            /tmp/latest.json

      - name: Update previous-release banner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Skip for pre-release/smoke-test tags so the live latest release's
        # banner is never clobbered.
        run: |
          if [[ "$GITHUB_REF_NAME" != *-* ]]; then
            node scripts/update-previous-banner.mjs "$GITHUB_REF_NAME"
          fi
