<!doctype html>
<html lang="en">
<head>

<title>Nergal — logo preview</title>
<style>

  h1 { font-weight: 600; letter-spacing: -0.02em; margin: 0 0 4px; }
  p.lead { color: var(--muted); margin: 0 0 32px; }
  .row { display: flex; gap: 32px; align-items: end; padding: 32px; background: #18181a; border-radius: 12px; }
  figure { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 0; flex: 1; }
  figcaption { font-size: 12px; color: var(--muted); }
</style>
</head>
