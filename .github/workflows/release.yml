name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      # Tauri's `bundleMediaFramework: true` for AppImage links GStreamer
      # at bundle time; the bundler reads this env var to discover the
      # plugin path on the runner.
      GSTREAMER_PLUGINS_DIR: /usr/lib/x86_64-linux-gnu/gstreamer-1.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build signed bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Extract release body
        run: node scripts/extract-release-body.mjs "${GITHUB_REF_NAME#v}" > /tmp/release-body.md

      - name: Generate latest.json updater manifest
        run: node scripts/generate-latest-json.mjs "$GITHUB_REF_NAME" /tmp/latest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Nergal $GITHUB_REF_NAME" \
            --notes-file /tmp/release-body.md \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/rpm/*.rpm \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/appimage/*.AppImage.sig \
            /tmp/latest.json

      - name: Update previous-release banner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-previous-banner.mjs "$GITHUB_REF_NAME"
